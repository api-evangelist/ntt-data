aid: ntt-data
name: NTT DATA
description: >-
  NTT DATA is a global IT services and consulting firm offering strategic
  consulting, cloud services, cybersecurity, data analytics, application
  development, and managed infrastructure across industries including banking,
  healthcare, manufacturing, public sector, and retail. The company operates
  in more than 50 countries and serves Fortune 500 enterprises with digital
  transformation, AI, and systems integration capabilities. NTT DATA does
  not publish a general public REST API; integrations are typically delivered
  through bespoke engagements and partner-specific solutions.
